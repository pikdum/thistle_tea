name: CI
on:
  push:
    branches:
      - master
  pull_request:
permissions:
  contents: read
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build .
  elixir:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        elixir: ["1.19"]
        otp: ["28"]
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - run: mix deps.get
      - name: fetch namigator (C++ NIF source)
        run: |
          git clone https://github.com/pikdum/namigator "$RUNNER_TEMP/namigator"
          git -C "$RUNNER_TEMP/namigator" checkout dceb56d1b8d5cf89bd6a3e89948b4d24f49ad801
          git -C "$RUNNER_TEMP/namigator" submodule update --init recastnavigation
          echo "NAMIGATOR_SRC=$RUNNER_TEMP/namigator" >> "$GITHUB_ENV"
      - run: mix compile
      - run: mix format --check-formatted
      - run: mix test
