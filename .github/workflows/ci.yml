name: CI
on:
  push:
    branches:
      - master
  pull_request:
permissions:
  contents: read
jobs:
  nix:
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: thistle-tea
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix flake check --system "${{ matrix.system }}"
      - run: nix build .#thistle-tea --system "${{ matrix.system }}" --print-build-logs
  elixir:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        elixir: ["1.20"]
        otp: ["29"]
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: thistle-tea
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - run: mix deps.get
      - name: fetch namigator (C++ NIF source)
        run: |
          git clone https://github.com/pikdum/namigator "$RUNNER_TEMP/namigator"
          git -C "$RUNNER_TEMP/namigator" checkout 3ffc08cdbb0266f00c4d79a705d20e8e7c5ba8a5
          git -C "$RUNNER_TEMP/namigator" submodule update --init recastnavigation
          echo "NAMIGATOR_SRC=$RUNNER_TEMP/namigator" >> "$GITHUB_ENV"
      - run: mix compile
      - run: mix format --check-formatted
      - run: mix test
      - run: nix run .#vmangos-db -- ./db
      - run: mix test --only vmangos_db
